<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>给奇奇的情书</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffdde4, #ffb3c1, #ff8fab);
    font-family: 'Georgia', 'STSong', 'SimSun', 'KaiTi', serif;
    overflow-x: hidden;
    position: relative;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* ===== 背景浮动爱心 ===== */
.bg-hearts-layer {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
}
.bg-heart {
    position: absolute;
    color: rgba(255, 107, 129, 0.24);
    animation: floatBg linear infinite;
    user-select: none;
    filter: blur(0.3px);
}
.bg-heart.large {
    color: rgba(255, 130, 150, 0.18);
    filter: blur(0.6px);
}
@keyframes floatBg {
    0%   { transform: translateY(105vh) translateX(0) rotate(0deg) scale(0.3); opacity: 0; }
    5%   { opacity: 0.45; }
    95%  { opacity: 0.45; }
    100% { transform: translateY(-8vh) translateX(30px) rotate(540deg) scale(0.9); opacity: 0; }
}
@keyframes floatBgAlt {
    0%   { transform: translateY(105vh) translateX(0) rotate(0deg) scale(0.4); opacity: 0; }
    5%   { opacity: 0.35; }
    95%  { opacity: 0.35; }
    100% { transform: translateY(-8vh) translateX(-40px) rotate(-480deg) scale(0.7); opacity: 0; }
}
@keyframes floatBgSlow {
    0%   { transform: translateY(108vh) translateX(0) rotate(0deg) scale(0.2); opacity: 0; }
    6%   { opacity: 0.30; }
    94%  { opacity: 0.30; }
    100% { transform: translateY(-6vh) translateX(20px) rotate(360deg) scale(1.1); opacity: 0; }
}
@keyframes fallDown {
    0%   { transform: translateY(-10vh) translateX(0) rotate(0deg) scale(0.4); opacity: 0; }
    8%   { opacity: 0.65; }
    92%  { opacity: 0.65; }
    100% { transform: translateY(108vh) translateX(25px) rotate(360deg) scale(0.8); opacity: 0; }
}
@keyframes fallDownAlt {
    0%   { transform: translateY(-10vh) translateX(0) rotate(0deg) scale(0.3); opacity: 0; }
    8%   { opacity: 0.55; }
    92%  { opacity: 0.55; }
    100% { transform: translateY(108vh) translateX(-30px) rotate(-300deg) scale(0.6); opacity: 0; }
}
.bg-heart.fall {
    animation-name: fallDown;
    color: rgba(255, 130, 160, 0.28);
    filter: blur(0.5px);
}
.bg-heart.fall.alt {
    animation-name: fallDownAlt;
    color: rgba(255, 160, 185, 0.22);
    filter: blur(0.8px);
}

/* ===== 主容器 ===== */
.main-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 1; position: relative;
    padding: 20px 0;
    transition: opacity 0.8s, transform 0.8s;
}
.main-container.fade-out {
    opacity: 0; transform: scale(0.75); pointer-events: none;
}

/* ===== 上方文字 ===== */
.top-text {
    font-size: 1.7rem;
    color: #fff;
    text-shadow: 2px 2px 10px rgba(180, 60, 80, 0.4);
    margin-bottom: 30px;
    animation: floating 3s ease-in-out infinite;
    text-align: center; letter-spacing: 2px;
    font-weight: bold; user-select: none;
}
@keyframes floating {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
}

/* ===== 舞台 ===== */
.stage {
    position: relative;
    width: 390px; height: 480px;
}

/* ===== 信纸卡片 ===== */
.letter-card {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%) scaleY(0.08);
    width: 360px; height: 440px;
    background: linear-gradient(180deg, #fffffb 0%, #fcf9f0 4%, #faf7e9 96%, #f3ebd8 100%);
    border-radius: 10px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    z-index: 1; opacity: 0; pointer-events: none;
    overflow: hidden;
    display: flex; flex-direction: column;
    transition:
        opacity 0.5s ease 0.4s,
        z-index 0s 0.4s,
        top 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) 0.4s,
        transform 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) 0.4s;
}
.letter-card.revealed {
    top: 50%;
    opacity: 1;
    transform: translate(-50%, -50%) scaleY(1);
    pointer-events: auto; z-index: 5;
}

/* 信纸滚动区 */
.letter-scroll {
    flex: 1;
    overflow-y: auto; overflow-x: hidden;
    padding: 24px 28px 10px 28px;
    position: relative;
    background: repeating-linear-gradient(
        to bottom,
        #e8dfd0 0px,
        #e8dfd0 1px,
        transparent 1px,
        transparent calc(2.15em)
    );
    background-position: 0 37px;
}
.letter-scroll::-webkit-scrollbar { width: 4px; }
.letter-scroll::-webkit-scrollbar-thumb { background: #e0ceb8; border-radius: 2px; }

.letter-text {
    position: relative; z-index: 1;
    font-size: 16px; line-height: 2.15; color: #5d4037;
}
.letter-text p { margin-bottom: 0; text-indent: 2em; }

/* 信纸底部爱心区（在内容下边） */
.letter-footer {
    height: 52px;
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 14px; flex-shrink: 0;
    border-top: 1px solid #efe8d8;
}
.corner-heart {
    width: 32px; height: 29px;
    cursor: pointer; opacity: 0;
    transition: opacity 0.5s ease 0.7s;
    animation: heartPulse 1.5s ease-in-out infinite;
    filter: drop-shadow(0 2px 6px rgba(255, 71, 87, 0.4));
    pointer-events: none;
}
.corner-heart.show { opacity: 1; pointer-events: auto; }
.corner-heart:hover { animation: heartPulseFast 0.6s ease-in-out infinite; }

.heart-sm { position: relative; width: 100%; height: 100%; }
.heart-sm::before, .heart-sm::after {
    content: ''; position: absolute; top: 0;
    width: 52%; height: 82%;
    background: linear-gradient(135deg, #ff6b81, #ff4757);
    border-radius: 50px 50px 0 0;
}
.heart-sm::before { left: 50%; transform: rotate(-45deg); transform-origin: 0 100%; }
.heart-sm::after  { left: 0;  transform: rotate(45deg);  transform-origin: 100% 100%; }

@keyframes heartPulse {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.2); }
    28% { transform: scale(1); }
    42% { transform: scale(1.15); }
    56% { transform: scale(1); }
}
@keyframes heartPulseFast {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.25); }
    50% { transform: scale(1); }
    75% { transform: scale(1.18); }
}

/* ===== 信封 ===== */
.envelope {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 370px; height: 250px;
    z-index: 3;
    filter: drop-shadow(0 12px 35px rgba(150, 30, 50, 0.22));
    user-select: none;
    transition: opacity 0.55s 0.8s, transform 0.45s 0.8s;
}
.envelope.discard {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.75);
    pointer-events: none;
}

.envelope-body {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #fdf3e0, #f4e3ca 40%, #ebd5b8);
    border: 2px solid #d4b590;
    border-radius: 10px; z-index: 0;
}
.envelope-body::after {
    content: '';
    position: absolute;
    inset: 12px 18px;
    border: 2px dashed rgba(180, 140, 110, 0.14);
    border-radius: 5px; pointer-events: none;
}

/* 信封三角封盖 — 加大加长，盖住信封主体上半部 */
.envelope-flap {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 62%;
    background: linear-gradient(180deg, #fbeee0, #f0dcc4 55%, #e4caa5);
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    z-index: 1;
    transform-origin: top center;
    backface-visibility: hidden;
    transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 10px 10px 0 0;
}
.envelope-flap.open { transform: rotateX(-180deg); }

/* ===== 爱心封口贴 ===== */
.heart-seal {
    position: absolute;
    top: 53%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 52px; height: 47px;
    z-index: 2;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.25s, opacity 0.4s;
    filter: drop-shadow(0 3px 10px rgba(255, 71, 87, 0.5));
}
.heart-seal:hover  { transform: translate(-50%, -50%) scale(1.22); }
.heart-seal:active { transform: translate(-50%, -50%) scale(0.92); }
.heart-seal.hidden {
    opacity: 0; pointer-events: none;
    transform: translate(-50%, -50%) scale(0.35);
}

.seal-h { position: relative; width: 100%; height: 100%; }
.seal-h::before, .seal-h::after {
    content: ''; position: absolute; top: 0;
    width: 52%; height: 82%;
    background: linear-gradient(135deg, #ff6b81, #ff4757);
    border-radius: 50px 50px 0 0;
}
.seal-h::before {
    left: 50%; transform: rotate(-45deg); transform-origin: 0 100%;
    box-shadow: -2px -2px 6px rgba(255,255,255,0.22) inset;
}
.seal-h::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }

/* ===== 下方文字 ===== */
.bottom-text {
    font-size: 1.15rem;
    color: #fff;
    text-shadow: 1px 1px 6px rgba(180, 60, 80, 0.35);
    margin-top: 30px;
    animation: floating 3s ease-in-out infinite 0.8s;
    text-align: center; letter-spacing: 1px; user-select: none;
    transition: opacity 0.6s;
}
.bottom-text.hidden {
    opacity: 0; animation: none;
}

/* ===== 大爱心场景 ===== */
.big-heart-scene {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10; pointer-events: none;
    opacity: 0; transition: opacity 1.2s;
}
.big-heart-scene.active { opacity: 1; }

.big-heart-wrapper {
    position: absolute;
    top: 50%; left: 50%;
    pointer-events: none;
}
.big-heart-wrapper.beating {
    animation: bigBeat 1s ease-in-out infinite;
}
@keyframes bigBeat {
    0%, 100% { transform: scale(1); }
    12%      { transform: scale(1.08); }
    25%      { transform: scale(1); }
    37%      { transform: scale(1.06); }
    50%      { transform: scale(1); }
}

.form-heart {
    position: absolute;
    color: #ff4757;
    transition: left 1.2s cubic-bezier(0.22, 0.61, 0.36, 1),
                top 1.2s cubic-bezier(0.22, 0.61, 0.36, 1),
                opacity 0.6s ease,
                transform 1.2s cubic-bezier(0.22, 0.61, 0.36, 1);
    pointer-events: none;
    will-change: transform, opacity, left, top;
}
.form-heart.outline {
    filter: drop-shadow(0 2px 4px rgba(255, 71, 87, 0.35));
    color: #ff4757;
}

.falling-heart {
    position: fixed; pointer-events: none;
    color: #ff6b81;
    animation: heartFall linear infinite;
    z-index: 9;
}
@keyframes heartFall {
    0%   { transform: translateY(-5vh) rotate(0deg); opacity: 0; }
    8%   { opacity: 0.5; }
    85%  { opacity: 0.4; }
    100% { transform: translateY(108vh) rotate(360deg); opacity: 0; }
}

/* ==================== 移动端适配 ==================== */
@media (max-width: 768px) {
    body {
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
    }
    .main-container { padding: 12px 0; }
    .top-text {
        font-size: clamp(1rem, 5.5vw, 1.7rem);
        margin-bottom: clamp(10px, 3vh, 30px);
        letter-spacing: 1px;
    }
    .bottom-text {
        font-size: clamp(0.75rem, 3.8vw, 1.15rem);
        margin-top: clamp(8px, 2.5vh, 30px);
    }
    .stage {
        width: 94vw;
        max-width: 390px;
        height: clamp(320px, 78vh, 500px);
    }
    .envelope {
        width: 86vw;
        max-width: 370px;
        height: calc(86vw * 0.676);
        max-height: 250px;
    }
    .letter-card {
        width: 84vw;
        max-width: 360px;
        height: calc(84vw * 1.22);
        max-height: 450px;
    }
    .letter-scroll {
        padding: clamp(8px, 3vw, 24px) clamp(10px, 4vw, 28px) 4px;
    }
    .letter-text {
        font-size: clamp(13px, 4.2vw, 16px);
        line-height: 2;
    }
    .letter-text p { margin-bottom: 10px; }
    .letter-line-item { margin-bottom: clamp(10px, 3vh, 22px); }
    .letter-footer { height: clamp(34px, 10vw, 52px); }
    .corner-heart {
        width: clamp(24px, 8vw, 32px);
        height: clamp(22px, 7vw, 29px);
    }
    .heart-seal {
        width: clamp(36px, 13vw, 52px);
        height: clamp(32px, 11vw, 47px);
        top: 53%;
    }
}

/* ===== 横屏适配 ===== */
@media (max-width: 920px) and (max-height: 480px) {
    .stage { height: 82vh; max-height: 300px; }
    .envelope { max-height: 170px; }
    .letter-card { max-height: 320px; }
    .top-text { margin-bottom: 4px; font-size: clamp(0.8rem, 4vh, 1.2rem); }
    .bottom-text { margin-top: 4px; font-size: clamp(0.65rem, 3vh, 1rem); }
}

/* ===== 小屏加深 ===== */
@media (max-width: 350px) {
    .letter-text { font-size: 12px; line-height: 1.7; }
    .letter-scroll { padding: 4px 6px 2px; }
}

/* ===== 返回按钮 ===== */
.back-heart {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom, 20px));
    left: max(16px, env(safe-area-inset-left, 16px));
    width: 40px; height: 37px;
    z-index: 20;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
    filter: drop-shadow(0 2px 8px rgba(255, 71, 87, 0.45));
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}
.back-heart.show {
    opacity: 1;
    pointer-events: auto;
}
.back-heart:active { transform: scale(0.85); }
.back-h { position: relative; width: 100%; height: 100%; }
.back-h::before, .back-h::after {
    content: ''; position: absolute; top: 0;
    width: 52%; height: 82%;
    background: linear-gradient(135deg, #ff6b81, #ff4757);
    border-radius: 50px 50px 0 0;
}
.back-h::before { left: 50%; transform: rotate(-45deg); transform-origin: 0 100%; }
.back-h::after  { left: 0;  transform: rotate(45deg);  transform-origin: 100% 100%; }
.back-arrow {
    position: absolute; z-index: 1;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff; font-size: 16px; font-weight: bold;
    line-height: 1; user-select: none;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
@media (max-width: 768px) {
    .back-heart {
        width: clamp(32px, 10vw, 40px);
        height: clamp(29px, 9vw, 37px);
        bottom: max(14px, env(safe-area-inset-bottom, 14px));
        left: max(10px, env(safe-area-inset-left, 10px));
    }
    .back-arrow { font-size: clamp(12px, 4vw, 16px); }
}
</style>
</head>
<body>

<div class="bg-hearts-layer" id="bgHearts"></div>

<div class="back-heart" id="backHeart" title="返回">
    <div class="back-h"></div>
    <span class="back-arrow">&#x2190;</span>
</div>

<audio id="bgm" src="bgm.mp3" loop preload="auto" style="display:none;"></audio>

<div class="main-container" id="mainContainer">
    <div class="top-text">这是一封送给奇奇的情书</div>

    <div class="stage" id="stage">

        <!-- 信纸 -->
        <div class="letter-card" id="letterCard">
            <div class="letter-scroll">
                <!-- ★★★ 信的内容 ★★★ -->
                <div class="letter-text" id="letterText">
                    <p>亲爱的奇奇同学：</p>
                    <p>我很庆幸，人海茫茫，我遇见了你。谢谢你出现在我的生命里，治愈我的疲惫，温暖我的生活。</p>
                    <p>未来的日子，不敷衍、不将就，我想好好爱你、好好珍惜你。想和你走过春夏秋冬，熬过平淡琐碎，看很多场风景，把普通的日子，都过成属于我们的浪漫。无论未来是晴空万里，还是风雨兼程，我都会一直站在你身边，护你周全，予你温柔，始终如一。</p>
                    <p>520，我爱你。</p>
                    <p>不止今天，而是朝朝暮暮，年年岁岁。</p>
                    <p>永远偏爱你的我</p>
                    <p>写于 520 爱意满满之日</p>
                </div>
                <!-- ★★★ 内容结束 ★★★ -->
            </div>

            <div class="letter-footer">
                <div class="corner-heart" id="cornerHeart" title="点击生成大爱心">
                    <div class="heart-sm"></div>
                </div>
            </div>
        </div>

        <!-- 信封 -->
        <div class="envelope" id="envelopeWrapper">
            <div class="envelope-body"></div>
            <div class="envelope-flap" id="envelopeFlap"></div>
            <div class="heart-seal" id="heartSeal" title="点击展开情书">
                <div class="seal-h"></div>
            </div>
        </div>

    </div>

    <div class="bottom-text" id="bottomText">点击爱心展开情书</div>
</div>

<div class="big-heart-scene" id="bigHeartScene">
    <div class="big-heart-wrapper" id="bigHeartWrapper"></div>
</div>

<script>
(function() {
'use strict';

/* BGM 播放 */
var bgm = document.getElementById('bgm');
var bgmReady = false;
bgm.volume = 0.5;
function tryPlay() {
    if (bgmReady) return;
    bgm.play().then(function() {
        bgmReady = true;
    }).catch(function(){});
}
tryPlay();
bgm.addEventListener('canplay', function() { tryPlay(); });
document.addEventListener('click', function() { tryPlay(); });
document.addEventListener('touchstart', function() { tryPlay(); });

/* 背景浮动爱心 */
var bg = document.getElementById('bgHearts');
var animations = ['floatBg', 'floatBgAlt', 'floatBgSlow'];
for (var i = 0; i < 30; i++) {
    var h = document.createElement('span');
    h.className = 'bg-heart';
    var isLarge = i % 5 === 0;
    if (isLarge) h.classList.add('large');
    h.textContent = '\u2665';
    h.style.left = Math.random() * 98 + '%';
    h.style.fontSize = (isLarge ? 28 + Math.random() * 40 : 10 + Math.random() * 22) + 'px';
    h.style.animationName = animations[i % 3];
    h.style.animationDuration = (isLarge ? 18 + Math.random() * 16 : 10 + Math.random() * 16) + 's';
    h.style.animationDelay = Math.random() * 18 + 's';
    bg.appendChild(h);
}
/* 下落爱心（从上往下） */
for (var i = 0; i < 30; i++) {
    var d = document.createElement('span');
    d.className = 'bg-heart fall';
    if (i % 2 === 0) d.classList.add('alt');
    d.textContent = '\u2665';
    d.style.left = Math.random() * 96 + '%';
    d.style.fontSize = (10 + Math.random() * 18) + 'px';
    d.style.animationDuration = (8 + Math.random() * 12) + 's';
    d.style.animationDelay = Math.random() * 8 + 's';
    bg.appendChild(d);
}

var heartSeal       = document.getElementById('heartSeal');
var envelopeFlap    = document.getElementById('envelopeFlap');
var envelopeWrapper = document.getElementById('envelopeWrapper');
var letterCard      = document.getElementById('letterCard');
var cornerHeart     = document.getElementById('cornerHeart');
var bottomText      = document.getElementById('bottomText');
var mainContainer   = document.getElementById('mainContainer');
var bigHeartScene   = document.getElementById('bigHeartScene');
var bigHeartWrapper = document.getElementById('bigHeartWrapper');
var state = 0;

/* 步骤1：点击爱心封口 */
heartSeal.addEventListener('click', function(e) {
    tryPlay();
    if (state !== 0) return;
    state = 1;
    e.stopPropagation();
    heartSeal.classList.add('hidden');
    envelopeFlap.classList.add('open');
    bottomText.classList.add('hidden');

    setTimeout(function() {
        envelopeWrapper.classList.add('discard');
    }, 800);

    setTimeout(function() {
        letterCard.classList.add('revealed');
    }, 400);

    setTimeout(function() {
        cornerHeart.classList.add('show');
    }, 1500);
    setTimeout(function() {
        backHeart.classList.add('show');
    }, 1200);
});

/* 步骤2：点击右下角爱心 */
cornerHeart.addEventListener('click', function(e) {
    if (state !== 1) return;
    state = 2;
    e.stopPropagation();
    backHeart.classList.add('show');
    startBigHeart();
});

/* 返回按钮 */
var backHeart = document.getElementById('backHeart');
function goBack() {
    if (state === 2) {
        state = 1;
        bigHeartScene.classList.remove('active');
        bigHeartWrapper.classList.remove('beating');
        bigHeartWrapper.innerHTML = '';
        mainContainer.classList.remove('fade-out');
        backHeart.classList.add('show');
        setTimeout(function() {
            cornerHeart.classList.add('show');
        }, 400);
    } else if (state === 1) {
        state = 0;
        backHeart.classList.remove('show');
        letterCard.classList.remove('revealed');
        cornerHeart.classList.remove('show');
        envelopeWrapper.classList.remove('discard');
        setTimeout(function() {
            heartSeal.classList.remove('hidden');
            envelopeFlap.classList.remove('open');
            bottomText.classList.remove('hidden');
        }, 400);
    }
}
backHeart.addEventListener('click', function(e) {
    e.stopPropagation();
    goBack();
});

/* 爱心曲线 */
function hpt(t, s) {
    var x = 16 * Math.pow(Math.sin(t), 3);
    var y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x: x * s, y: y * s };
}

/* 大爱心动画 */
function startBigHeart() {
    mainContainer.classList.add('fade-out');
    setTimeout(function() { bigHeartScene.classList.add('active'); }, 600);

    var w = window.innerWidth;
    var S = w < 380 ? 10 : w < 500 ? 12 : 14;
    var scatter = w < 380 ? 200 : w < 500 ? 260 : 350;
    var N = 72, interiorN = 400, list = [];

    /* 外圈轮廓 */
    for (var i = 0; i < N; i++) {
        var t = (i / N) * Math.PI * 2, p = hpt(t, S);
        var a = Math.random() * Math.PI * 2;
        var d = scatter + Math.random() * scatter * 1.3;
        var sx = Math.cos(a) * d, sy = Math.sin(a) * d;

        var el = document.createElement('span');
        el.className = 'form-heart outline';
        el.textContent = '\u2665';
        el.style.left = sx + 'px';
        el.style.top = sy + 'px';
        el.style.fontSize = (w < 380 ? 11 : 14) + Math.random() * 6 + 'px';
        el.style.opacity = '0';
        el.style.color = '#ff4757';
        el.dataset.tx = p.x;
        el.dataset.ty = p.y;

        bigHeartWrapper.appendChild(el);
        list.push(el);
    }

    /* 内部填充 - 多边形裁剪均匀散点 */
    var polyPts = [];
    for (var oi = 0; oi < 720; oi++) {
        polyPts.push(hpt((oi / 720) * Math.PI * 2, S));
    }
    function inside(px, py) {
        var res = false;
        for (var i = 0, j = polyPts.length - 1; i < polyPts.length; j = i++) {
            var xi = polyPts[i].x, yi = polyPts[i].y;
            var xj = polyPts[j].x, yj = polyPts[j].y;
            if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
                res = !res;
            }
        }
        return res;
    }
    var filled = [];
    var tries = 0, maxTry = interiorN * 10;
    while (filled.length < interiorN && tries < maxTry) {
        tries++;
        var cx = (Math.random() - 0.5) * 36 * S;
        var cy = (Math.random() * 30 - 13) * S;
        if (inside(cx, cy)) {
            filled.push({ x: cx, y: cy });
        }
    }
    for (var j = 0; j < filled.length; j++) {
        var rp = filled[j];

        var ra = Math.random() * Math.PI * 2;
        var rd = scatter * 0.6 + Math.random() * scatter * 1.6;
        var rsx = Math.cos(ra) * rd, rsy = Math.sin(ra) * rd;

        var rel = document.createElement('span');
        rel.className = 'form-heart';
        rel.textContent = '\u2665';
        rel.style.left = rsx + 'px';
        rel.style.top = rsy + 'px';
        rel.style.fontSize = (w < 380 ? 7 : 10) + Math.random() * 6 + 'px';
        rel.style.opacity = '0';
        rel.style.color = 'rgba(255, 71, 87, 0.75)';
        rel.dataset.tx = rp.x;
        rel.dataset.ty = rp.y;

        bigHeartWrapper.appendChild(rel);
        list.push(rel);
    }

    /* 随机打乱，外圈和内层混在一起飞入 */
    for (var k = list.length - 1; k > 0; k--) {
        var rIdx = Math.floor(Math.random() * (k + 1));
        var tmp = list[k];
        list[k] = list[rIdx];
        list[rIdx] = tmp;
    }

    setTimeout(function() {
        list.forEach(function(el, i) {
            setTimeout(function() { el.style.opacity = '1'; }, i * 1);
        });
    }, 100);

    setTimeout(function() {
        list.forEach(function(el, i) {
            setTimeout(function() {
                el.style.left = el.dataset.tx + 'px';
                el.style.top = el.dataset.ty + 'px';
                el.style.transform = 'translate(-50%, -50%)';
            }, i * 3);
        });
    }, 500);

    var total = 500 + list.length * 3 + 1000 + 300;
    setTimeout(function() {
        bigHeartWrapper.classList.add('beating');
        falling();
    }, total);
}

/* 掉落爱心 */
function falling() {
    function spawn() {
        if (state !== 2) return;
        var el = document.createElement('span');
        el.className = 'falling-heart';
        el.textContent = '\u2665';
        el.style.left = Math.random() * 95 + '%';
        el.style.top = '-30px';
        var fmin = window.innerWidth < 380 ? 10 : 14;
        var fmax = window.innerWidth < 380 ? 18 : 24;
        el.style.fontSize = (fmin + Math.random() * fmax) + 'px';
        el.style.animationDuration = (5 + Math.random() * 8) + 's';
        el.style.opacity = (0.28 + Math.random() * 0.35);
        document.body.appendChild(el);
        var dur = parseFloat(el.style.animationDuration) * 1000;
        setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, dur + 200);
    }
    setInterval(function() { spawn(); }, 280);
    for (var i = 0; i < 10; i++) { setTimeout(function() { spawn(); }, i * 230); }
}

})();
</script>
